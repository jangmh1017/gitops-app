spring:
  application:
    name: ops-app1
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
  
server:
  port: 8081

app:
  profile: ${PROFILE:default}
  ops-app2-url: ${OPS_APP2_URL:http://ops-app2:8082}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    ops.app1: INFO
    org.springframework.web: INFO